version: "2.3"
name: "python-ledger-totals"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-04-python-ledger.git"
  branch: "main"
task_dir: "tasks/development"
deliverables:
- path: "src/ledger_totals.py"
  verify: "python -m unittest && python -m unittest tests.test_acceptance_ledger_totals"
- path: "tests/test_ledger_totals.py"
  verify: "python -m unittest && python -m unittest tests.test_acceptance_ledger_totals"
- path: "docs/DELIVERY.md"
  verify: "test -s docs/DELIVERY.md && grep -q \"^执行结果：通过$\" docs/DELIVERY.md"
execution:
  executor: "codex"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "ledger-implementation-agent"
    role: "实现 Python 账本汇总功能，维护单元测试与交付说明。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items:
    - id: "REV-LEDGER-001"
      source: "external-review"
      severity: "must"
      target: "docs/DELIVERY.md"
      issue: "交付说明必须记录验证命令和执行结果。"
      expected_fix: "在 docs/DELIVERY.md 中写明 unittest 与 acceptance 均通过。"
      acceptance: "grep -q \"执行结果：通过\" docs/DELIVERY.md"
verification:
  commands:
  - "python -m unittest"
  - "python -m unittest tests.test_acceptance_ledger_totals"
  - "test -s docs/DELIVERY.md && grep -q \"^执行结果：通过$\" docs/DELIVERY.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: true
